<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Warm background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8EE"/>
      <stop offset="100%" stop-color="#F5E6C8"/>
    </radialGradient>
    <!-- Gold gradient for decorative elements -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="50%" stop-color="#E8A800"/>
      <stop offset="100%" stop-color="#C8860A"/>
    </linearGradient>
    <!-- Red gradient for banner/shield -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C0392B"/>
      <stop offset="100%" stop-color="#8B1A10"/>
    </linearGradient>
    <!-- Skewer gradient -->
    <linearGradient id="skewerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#8B6010"/>
    </linearGradient>
    <!-- Meat gradient -->
    <linearGradient id="meatGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C0392B"/>
      <stop offset="50%" stop-color="#E8572A"/>
      <stop offset="100%" stop-color="#A93226"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#5A2D0C" flood-opacity="0.35"/>
    </filter>
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#3E1A08" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ── Background circle ── -->
  <circle cx="250" cy="250" r="245" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="5"/>

  <!-- ── Outer arabesque ring (decorative dots) ── -->
  <g opacity="0.55">
    <circle cx="250" cy="12"  r="5" fill="#E8A800"/>
    <circle cx="315" cy="20"  r="4" fill="#E8A800"/>
    <circle cx="374" cy="47"  r="4" fill="#E8A800"/>
    <circle cx="421" cy="90"  r="4" fill="#E8A800"/>
    <circle cx="453" cy="145" r="4" fill="#E8A800"/>
    <circle cx="467" cy="207" r="4" fill="#E8A800"/>
    <circle cx="460" cy="270" r="4" fill="#E8A800"/>
    <circle cx="436" cy="330" r="4" fill="#E8A800"/>
    <circle cx="395" cy="381" r="4" fill="#E8A800"/>
    <circle cx="343" cy="419" r="4" fill="#E8A800"/>
    <circle cx="284" cy="440" r="4" fill="#E8A800"/>
    <circle cx="222" cy="442" r="4" fill="#E8A800"/>
    <circle cx="162" cy="425" r="4" fill="#E8A800"/>
    <circle cx="108" cy="392" r="4" fill="#E8A800"/>
    <circle cx="65"  cy="345" r="4" fill="#E8A800"/>
    <circle cx="36"  cy="289" r="4" fill="#E8A800"/>
    <circle cx="24"  cy="228" r="4" fill="#E8A800"/>
    <circle cx="31"  cy="167" r="4" fill="#E8A800"/>
    <circle cx="58"  cy="111" r="4" fill="#E8A800"/>
    <circle cx="100" cy="67"  r="4" fill="#E8A800"/>
    <circle cx="153" cy="36"  r="4" fill="#E8A800"/>
    <circle cx="210" cy="16"  r="4" fill="#E8A800"/>
  </g>

  <!-- ── Ottoman-style arch frame ── -->
  <path d="M 140,185 Q 250,55 360,185 L 360,320 Q 250,380 140,320 Z"
        fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.6"/>

  <!-- ── Crescent moon (top-left) ── -->
  <g transform="translate(120,95)" filter="url(#shadow)">
    <path d="M 0,0 A 28,28 0 1 1 0,56 A 18,18 0 1 0 0,0 Z"
          fill="url(#goldGrad)" transform="rotate(-30,0,28)"/>
  </g>

  <!-- ── 8-pointed star (top-right) ── -->
  <g transform="translate(370,85)" filter="url(#shadow)">
    <polygon points="0,-22 5.5,-5.5 22,0 5.5,5.5 0,22 -5.5,5.5 -22,0 -5.5,-5.5"
             fill="url(#goldGrad)"/>
    <polygon points="0,-22 5.5,-5.5 22,0 5.5,5.5 0,22 -5.5,5.5 -22,0 -5.5,-5.5"
             fill="url(#goldGrad)" transform="rotate(22.5)"/>
  </g>

  <!-- ══════════════════════════════ SKEWER (focal point) ══════════════════════════════ -->
  <!-- Skewer stick -->
  <rect x="246" y="65" width="8" height="245" rx="4"
        fill="url(#skewerGrad)" filter="url(#shadow)"/>

  <!-- Skewer tip -->
  <polygon points="250,55 246,72 254,72" fill="#C8860A"/>

  <!-- Meat layers on the skewer (bold, stacked) -->
  <!-- Layer 5 (bottom) -->
  <ellipse cx="250" cy="285" rx="42" ry="16" fill="url(#meatGrad)" stroke="#7B241C" stroke-width="1.5"/>
  <!-- Layer 4 -->
  <ellipse cx="250" cy="260" rx="46" ry="16" fill="url(#meatGrad)" stroke="#7B241C" stroke-width="1.5"/>
  <!-- Layer 3 -->
  <ellipse cx="250" cy="235" rx="44" ry="15" fill="url(#meatGrad)" stroke="#7B241C" stroke-width="1.5"/>
  <!-- Layer 2 -->
  <ellipse cx="250" cy="210" rx="40" ry="15" fill="url(#meatGrad)" stroke="#7B241C" stroke-width="1.5"/>
  <!-- Layer 1 (top) -->
  <ellipse cx="250" cy="187" rx="35" ry="13" fill="url(#meatGrad)" stroke="#7B241C" stroke-width="1.5"/>

  <!-- Highlights on meat layers -->
  <ellipse cx="238" cy="183" rx="12" ry="4" fill="#E86A40" opacity="0.5"/>
  <ellipse cx="236" cy="207" rx="14" ry="4" fill="#E86A40" opacity="0.4"/>
  <ellipse cx="237" cy="232" rx="15" ry="4" fill="#E86A40" opacity="0.35"/>

  <!-- Pepper / veggie accent on skewer -->
  <ellipse cx="250" cy="165" rx="14" ry="11" fill="#2ECC71" stroke="#1A7A44" stroke-width="1.2"/>
  <ellipse cx="245" cy="162" rx="5" ry="4" fill="#27AE60" opacity="0.6"/>

  <!-- ══════════════════════════════ BANNER / TEXT AREA ══════════════════════════════ -->
  <!-- Decorative banner ribbon -->
  <path d="M 60,330 L 100,315 L 400,315 L 440,330 L 400,345 L 100,345 Z"
        fill="url(#redGrad)" stroke="#F5C842" stroke-width="2" filter="url(#shadow)"/>
  <!-- Banner end flaps -->
  <polygon points="100,315 60,330 100,345 80,345 60,330 80,315" fill="#7B1A10"/>
  <polygon points="400,315 440,330 400,345 420,345 440,330 420,315" fill="#7B1A10"/>

  <!-- "SULTAN" text -->
  <text x="250" y="338"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="26"
        font-weight="bold"
        letter-spacing="8"
        fill="#F5C842"
        text-anchor="middle"
        filter="url(#textShadow)">SULTAN</text>

  <!-- "SHAWARMA" text -->
  <text x="250" y="380"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="32"
        font-weight="bold"
        letter-spacing="4"
        fill="#8B1A10"
        text-anchor="middle"
        filter="url(#textShadow)">SHAWARMA</text>

  <!-- Decorative gold rule under "SHAWARMA" -->
  <line x1="95" y1="390" x2="405" y2="390" stroke="url(#goldGrad)" stroke-width="2"/>

  <!-- Small 8-pointed stars flanking "SHAWARMA" -->
  <polygon points="85,380 88,372 91,380 99,380 93,385 95,393 88,388 81,393 83,385 77,380"
           fill="#E8A800"/>
  <polygon points="415,380 418,372 421,380 429,380 423,385 425,393 418,388 411,393 413,385 407,380"
           fill="#E8A800"/>

  <!-- Tagline highlight band -->
  <rect x="88" y="400" width="324" height="28" rx="14" ry="14"
        fill="url(#goldGrad)" filter="url(#shadow)"/>
  <!-- Tagline -->
  <text x="250" y="419"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="15"
        font-weight="bold"
        letter-spacing="3.4"
        fill="#8B1A10"
        text-anchor="middle">Authentic Taste · Timeless Tradition</text>

  <!-- Arabesque flourish lines (left) -->
  <path d="M 70,240 Q 90,220 110,240 Q 90,260 70,240 Z" fill="url(#goldGrad)" opacity="0.5"/>
  <path d="M 55,255 Q 75,235 95,255 Q 75,275 55,255 Z" fill="url(#goldGrad)" opacity="0.35"/>

  <!-- Arabesque flourish lines (right) -->
  <path d="M 430,240 Q 410,220 390,240 Q 410,260 430,240 Z" fill="url(#goldGrad)" opacity="0.5"/>
  <path d="M 445,255 Q 425,235 405,255 Q 425,275 445,255 Z" fill="url(#goldGrad)" opacity="0.35"/>

  <!-- Bottom decorative arch -->
  <path d="M 150,455 Q 250,430 350,455" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.7"/>
  <path d="M 175,465 Q 250,445 325,465" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.5"/>
</svg>
